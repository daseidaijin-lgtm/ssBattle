<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>学歴マウントバトル</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>学歴マウントバトル</h1>

<button id="soundBtn">効果音：ON</button>

<div class="pp-area">
  <div>
    <h2>あなたPP：<span id="playerPP">4000</span></h2>
    <div class="hp-bar">
      <div id="playerBar" class="hp-fill"></div>
      <div id="playerText" class="hp-text">4000 / 4000</div>
    </div>
  </div>

  <div>
    <h2>CPU PP：<span id="cpuPP">4000</span></h2>
    <div class="hp-bar">
      <div id="cpuBar" class="hp-fill"></div>
      <div id="cpuText" class="hp-text">4000 / 4000</div>
    </div>
  </div>
</div>

<div class="level-area">
  <label>CPUタイプ：</label>
  <select id="cpuLevel">
    <option value="easy">Fラン</option>
    <option value="normal">私文</option>
    <option value="hard">国公立理系</option>
  </select>
</div>

<div class="battle">
  <div class="field-card" id="playerField">
    <h3>あなたの場</h3>
    <p id="playerName">？？？</p>
    <p id="playerPower">-</p>
  </div>

  <div class="field-card" id="cpuField">
    <h3>CPUの場</h3>
    <p id="cpuName">？？？</p>
    <p id="cpuPower">-</p>
  </div>
</div>

<h2 id="result">手札からカードを選べ！</h2>

<h2>あなたの手札</h2>
<div id="hand"></div>

<button id="resetBtn">リセット</button>

<div class="wipe player-wipe">
  <img src="fumin.png" class="wipe-img" alt="フーミン">
  <div>
    <strong>フーミン</strong>
    <p id="playerLine">いくぞ、学歴バトル開始！</p>
  </div>
</div>

<div class="wipe cpu-wipe">
  <img src="biyama.png" class="wipe-img" alt="ビーヤマ">
  <div>
    <strong>ビーヤマ</strong>
    <p id="cpuLine">これは読み合いやな。</p>
  </div>
</div>

<div id="damageContainer"></div>

<script src="java.js"></script>
</body>
</html>
